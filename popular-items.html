<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popular Items</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fff;
      color: #333;
    }

    /* ── Section ── */
    .popular-items {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .popular-items__title {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      border-bottom: 1px solid #ddd;
      margin-bottom: 40px;
    }

    .tabs__btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 22px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      position: relative;
      transition: color 0.2s;
    }

    .tabs__btn:hover { color: #333; }

    .tabs__btn.active {
      color: #222;
    }

    .tabs__btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: #222;
    }

    /* ── Product Grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 24px;
    }

    /* ── Product Card ── */
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      cursor: pointer;
    }

    .product-card__img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .product-card__img-wrap img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .product-card:hover .product-card__img-wrap img {
      transform: scale(1.05);
    }

    /* SALE badge */
    .product-card__badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #e74c3c;
      color: #fff;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 3px 7px;
      border-radius: 2px;
    }

    .product-card__name {
      font-size: 0.78rem;
      color: #444;
      line-height: 1.4;
    }

    /* Price */
    .product-card__price {
      font-size: 0.9rem;
      font-weight: 700;
      color: #222;
    }

    .product-card__price-old {
      font-size: 0.78rem;
      color: #aaa;
      text-decoration: line-through;
      margin-right: 4px;
    }

    .product-card__price-sale {
      color: #e74c3c;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 600px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .tabs__btn {
        padding: 10px 12px;
        font-size: 0.7rem;
      }

      .popular-items__title {
        font-size: 1.1rem;
      }
    }

    @media (max-width: 360px) {
      .product-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<section class="popular-items">
  <h2 class="popular-items__title">Popular Items</h2>

  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button class="tabs__btn active" role="tab" aria-selected="true" data-tab="new-arrivals">New Arrivals</button>
    <button class="tabs__btn" role="tab" aria-selected="false" data-tab="best-seller">Best Seller</button>
    <button class="tabs__btn" role="tab" aria-selected="false" data-tab="featured">Featured</button>
    <button class="tabs__btn" role="tab" aria-selected="false" data-tab="special">Special</button>
  </div>

  <!-- Products -->
  <div class="product-grid">

    <!-- Card 1 -->
    <div class="product-card">
      <div class="product-card__img-wrap">
        <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=300&q=80" alt="Achilles Ion Gabriel Velcro" />
      </div>
      <p class="product-card__name">Achilles Ion Gabriel Velcro</p>
      <p class="product-card__price">$298.32</p>
    </div>

    <!-- Card 2 -->
    <div class="product-card">
      <div class="product-card__img-wrap">
        <img src="https://images.unsplash.com/photo-1508057198894-247b23fe5ade?w=300&q=80" alt="BCBGeneration Women's BG" />
      </div>
      <p class="product-card__name">BCBGeneration Women's BG</p>
      <p class="product-card__price">$9.90</p>
    </div>

    <!-- Card 3 — SALE -->
    <div class="product-card">
      <div class="product-card__img-wrap">
        <span class="product-card__badge">SALE</span>
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&q=80" alt="Beau Belle Kabuki Brush Set" />
      </div>
      <p class="product-card__name">Beau Belle Kabuki Brush Set –</p>
      <p class="product-card__price">
        <span class="product-card__price-old">$249.93</span>
        <span class="product-card__price-sale">$224.94</span>
      </p>
    </div>

    <!-- Card 4 -->
    <div class="product-card">
      <div class="product-card__img-wrap">
        <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=300&q=80" alt="BN0031 – silver Braun" />
      </div>
      <p class="product-card__name">BN0031 – silver Braun</p>
      <p class="product-card__price">$67.93</p>
    </div>

    <!-- Card 5 -->
    <div class="product-card">
      <div class="product-card__img-wrap">
        <img src="https://images.unsplash.com/photo-1533139502658-0198f920d8e8?w=300&q=80" alt="C3S – polished/black Uniform" />
      </div>
      <p class="product-card__name">C3S – polished/black Uniform</p>
      <p class="product-card__price">$25.00</p>
    </div>

  </div>
</section>

<script>
  // Tab switching
  document.querySelectorAll('.tabs__btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tabs__btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
    });
  });
</script>

</body>
</html>
